name: augur
description: MCP server that analyzes Flutter/Dart upgrade impact using AST-based code analysis.
version: 1.0.0
homepage: https://github.com/manjuhere/augur
repository: https://github.com/manjuhere/augur
topics:
  - flutter
  - dart
  - mcp
  - upgrade
  - migration

executables:
  augur: server

environment:
  sdk: ^3.0.0

dependencies:
  mcp_dart: ^2.1.0
  analyzer: ^7.0.0
  yaml: ^3.1.0
  pub_semver: ^2.1.0
  http: ^1.2.0
  path: ^1.9.0
  glob: ^2.1.0
  crypto: ^3.0.0
  collection: ^1.18.0

dev_dependencies:
  test: ^1.25.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
  lints: ^6.1.0
